# claude-code-remote task config — minimal smoke test
#
# Sourced as bash. Set the following variables:
#   NAME             — unique task name (becomes tmux session id)
#   REMOTE           — ssh alias (must be in ~/.ssh/config)
#   PROMPT           — inline prompt OR set PROMPT_FILE instead
#   INPUTS           — bash array of local files to scp to remote (optional)
#   OUTPUT_PATTERN   — glob for files to recover (default *.md)
#   RECOVER_TO       — local destination dir
#   QC_REQUIRED_SECTIONS — space-separated section markers QC must find
#   QC_REQUIRED_FRONTMATTER — space-separated frontmatter field names QC must find
#   RETRY_MAX        — max retries on QC failure (default 2)
#   TIMEOUT          — wait timeout in seconds for `run` mode (default 1800)

NAME=hello-world
REMOTE=remote-host

PROMPT="Use the Bash tool to write the literal text 'hello world from claude-code-remote' to the file ~/cc-remote-output/hello-world/output.txt. Then confirm by reading it back. The directory already exists. Reply with the file contents on a single line."

OUTPUT_PATTERN="output.txt"
RECOVER_TO="$HOME/.cache/claude-code-remote/recovered/hello-world"

# QC: at minimum the file must contain the magic phrase
QC_REQUIRED_SECTIONS="hello world"
QC_REQUIRED_FRONTMATTER=""
QC_MIN_SIZE=10                  # 35-byte hello-world output is fine; default 100 is for docs

RETRY_MAX=2
TIMEOUT=300
