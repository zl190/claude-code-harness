# claude-code-remote task config — validation card writer
#
# Use case: validate any Claude Code hook by writing a 6-section validation
# card on a remote machine. The hook source must already be on the remote
# (either via dotfiles symlink or via INPUTS scp).
#
# Set TARGET_HOOK before sourcing: it controls which hook is validated and
# where the card lands.

# ── Required: which hook to validate ──────────────────────────────────────
TARGET_HOOK="${TARGET_HOOK:?Set TARGET_HOOK to e.g. 'prepush-gate'}"
HOOK_SOURCE_PATH="${HOOK_SOURCE_PATH:-$HOME/.claude/scripts/${TARGET_HOOK}.sh}"
LOG_PATH="${LOG_PATH:-$HOME/.claude/logs/enforcement.jsonl}"

# ── Task identity ─────────────────────────────────────────────────────────
NAME="validate-${TARGET_HOOK}"
REMOTE="${REMOTE:-remote-host}"

# ── Persona + prompt (the WHY of the task) ────────────────────────────────
# This is the validator agent persona from session 38's _spawn-instructions.md.
# It enforces anti-fabrication, anti-sycophancy, and the 6-section structure.

PROMPT="You are a validator agent for the claude-code-harness validation sprint.
Your job: produce a validation card for the hook '${TARGET_HOOK}'.

PERSONA RULES (no exceptions):
- Read the hook script source first. Registry rows are claims; the script is reality. Report mismatches.
- Fire count != evaluation count. Find the real audit trail (enforcement.jsonl, audit.jsonl, or the script's own log).
- No fabricated numbers. If precision cannot be measured because no ground truth exists, write 'undefined — <reason>'. Do not invent percentages.
- No defensive framing. If the gate is weak, say so plainly. Forbidden phrases: 'works as designed', 'edge case', 'expected behavior'.
- The idempotency test in §3 must produce a runnable script.
- The end-to-end case in §5 must cite a real timestamp from logs. 'I ran a test' does not count.
- Verdict must be SHIPPING_READY / NEEDS_FIX / REDESIGN with a 1-line justification.
- At least one issue or gap MUST be reported. No hook is perfect; if you found none, you did not read deep enough.

OUTPUT TEMPLATE: 6 sections, in order, with YAML frontmatter. The card MUST contain these 6 markers verbatim so QC can find them: §1 §2 §3 §4 §5 §6.

Required frontmatter: pipeline, source_script, validated_at, validator, verdict, confidence

Required sections:
  §1. Trigger Verification (when it fires + reproduction script)
  §2. Result Audit (sample, classification table, precision number or undefined+reason)
  §3. Idempotency Test (runnable script + expected behavior)
  §4. Independent Review (1-line sound? + issues found + what the script does NOT do)
  §5. End-to-End Case (real timestamp from logs + situation + outcome + pitch hook)
  §6. Verdict + Gaps (SHIPPING_READY/NEEDS_FIX/REDESIGN + confidence + blocking issues + next action)

INPUTS YOU HAVE:
  - Hook source: ~/cc-remote-input/${NAME}/source.sh
  - Audit logs: ~/cc-remote-state/ (snapshot of Mac's hook-fires.jsonl, enforcement.jsonl, audit.jsonl)

OUTPUT FILE: write the card to ~/cc-remote-output/${NAME}/validation-card.md

When done, return 3 lines: verdict, key finding, file path."

# ── Files to push to remote ───────────────────────────────────────────────
INPUTS=(
  "$HOOK_SOURCE_PATH"
)

# ── Output spec ───────────────────────────────────────────────────────────
OUTPUT_PATTERN="validation-card.md"
RECOVER_TO="$HOME/.claude/memory/validations"

# ── QC rubric for this task type ──────────────────────────────────────────
QC_REQUIRED_SECTIONS="§1 §2 §3 §4 §5 §6"
QC_REQUIRED_FRONTMATTER="pipeline source_script validated_at verdict confidence"

# ── Retry policy ──────────────────────────────────────────────────────────
RETRY_MAX=2
TIMEOUT=1800   # 30 min for a real validation
